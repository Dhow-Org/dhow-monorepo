<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dhow GitHub org avatar. Brass seal on deep ink. Designed at 512 for crisp
       rendering at any avatar size; export to PNG at 1024 for GitHub. -->
  <defs>
    <radialGradient id="glow" cx="78%" cy="16%" r="85%">
      <stop offset="0" stop-color="#123A42"/>
      <stop offset="55%" stop-color="#0A262B"/>
      <stop offset="100%" stop-color="#06181B"/>
    </radialGradient>
    <radialGradient id="brassGlow" cx="72%" cy="20%" r="70%">
      <stop offset="0" stop-color="rgba(215,162,59,0.12)"/>
      <stop offset="100%" stop-color="rgba(215,162,59,0)"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="0" fill="url(#glow)"/>
  <rect width="512" height="512" fill="url(#brassGlow)"/>

  <!-- seal, centered, ~64% of the canvas -->
  <g transform="translate(256 256) scale(6.7) translate(-24 -24)" fill="none" stroke="#D7A23B" stroke-linecap="round">
    <circle cx="24" cy="24" r="21" stroke-width="2.4"/>
    <circle cx="24" cy="24" r="16.5" stroke-width="1.2" stroke-dasharray="2 4.5" opacity="0.6"/>
    <path d="M24 12.5 V31" stroke-width="1.8" opacity="0.4"/>
    <path d="M24 14.5 L33.5 31 L24 31 Z" fill="#D7A23B" stroke="none"/>
    <path d="M24 17.5 L16.5 31 L24 31 Z" fill="#D7A23B" stroke="none" opacity="0.5"/>
    <path d="M14.5 32.5 Q24 37 33.5 32.5" stroke-width="1.9"/>
  </g>
</svg>
